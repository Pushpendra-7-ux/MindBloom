name: mindbloom_app
description: MindBloom - Mental Wellness Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP & API
  dio: ^5.7.0

  # Auth & Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3
  lottie: ^3.3.1

  # Audio
  just_audio: ^0.9.43
  audio_service: ^0.18.17

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
